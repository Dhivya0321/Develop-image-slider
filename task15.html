<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Slider</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#5f27cd);
}

.slider-container{
    width:90%;
    max-width:800px;
    position:relative;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.slider{
    display:flex;
    transition:transform 0.5s ease-in-out;
}

.slide{
    min-width:100%;
}

.slide img{
    width:100%;
    height:450px;
    object-fit:cover;
    display:block;
}

.btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:white;
    border:none;
    padding:15px;
    cursor:pointer;
    font-size:22px;
    border-radius:50%;
}

.prev{
    left:15px;
}

.next{
    right:15px;
}

.btn:hover{
    background:rgba(0,0,0,0.8);
}

.dots{
    position:absolute;
    bottom:15px;
    width:100%;
    text-align:center;
}

.dot{
    height:12px;
    width:12px;
    margin:0 5px;
    background:white;
    border-radius:50%;
    display:inline-block;
    cursor:pointer;
}

.active{
    background:#ff6b6b;
}

@media(max-width:768px){
    .slide img{
        height:250px;
    }
}
</style>
</head>
<body>

<div class="slider-container">

    <div class="slider" id="slider">

        <div class="slide">
            <img src="https://picsum.photos/id/1015/800/450" alt="Image 1">
        </div>

        <div class="slide">
            <img src="https://picsum.photos/id/1016/800/450" alt="Image 2">
        </div>

        <div class="slide">
            <img src="https://picsum.photos/id/1018/800/450" alt="Image 3">
        </div>

        <div class="slide">
            <img src="https://picsum.photos/id/1020/800/450" alt="Image 4">
        </div>

    </div>

    <button class="btn prev" onclick="prevSlide()">❮</button>
    <button class="btn next" onclick="nextSlide()">❯</button>

    <div class="dots">
        <span class="dot active" onclick="currentSlide(0)"></span>
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
    </div>

</div>

<script>
const slider = document.getElementById("slider");
const dots = document.querySelectorAll(".dot");

let index = 0;

function updateSlider(){
    slider.style.transform =
    `translateX(-${index * 100}%)`;

    dots.forEach(dot =>
        dot.classList.remove("active")
    );

    dots[index].classList.add("active");
}

function nextSlide(){
    index++;
    if(index >= dots.length){
        index = 0;
    }
    updateSlider();
}

function prevSlide(){
    index--;
    if(index < 0){
        index = dots.length - 1;
    }
    updateSlider();
}

function currentSlide(i){
    index = i;
    updateSlider();
}

setInterval(nextSlide, 3000);
</script>

</body>
</html>
